<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ราคาทองคำ Real-time TV Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; transition: background-color 0.5s; }
        /* ใช้ Flexbox เพื่อให้ตัวเลขขยายจนเต็มพื้นที่ */
        .price-container { display: flex; align-items: baseline; justify-content: space-between; width: 100%; }
        .big-text { font-size: 14rem; font-weight: 700; line-height: 1; flex-grow: 1; text-align: right; padding-right: 20px; }
        .label-text { font-size: 3.5rem; font-weight: 700; }
        .diff-text { font-size: 4rem; font-weight: 700; }
        .flash-alert { background-color: #f59e0b !important; } /* เปลี่ยนเป็นสีส้มทองเตือนเวลาเปลี่ยนราคา */
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center overflow-hidden p-8">

    <div class="w-full text-center mb-6">
        <h1 class="text-7xl font-bold text-white uppercase tracking-widest bg-slate-800 py-4 rounded-xl">ราคาสมาคมค้าทองคำ 96.5%</h1>
        <p id="systemStatus" class="text-3xl text-slate-400 mt-2">กำลังโหลดข้อมูล...</p>
    </div>

    <div class="w-full flex flex-col gap-8 px-6">
        <div id="barCard" class="bg-red-900 p-8 rounded-3xl border-4 border-red-500 shadow-2xl">
            <h2 class="text-6xl font-bold text-white mb-4">ทองคำแท่ง</h2>
            <div class="flex flex-col gap-4">
                <div class="price-container"><span class="label-text">รับซื้อ</span><span id="barBuy" class="big-text">0</span><span id="diffBuy" class="diff-text"></span></div>
                <div class="price-container"><span class="label-text">ขายออก</span><span id="barSell" class="big-text">0</span></div>
            </div>
        </div>

        <div id="ornCard" class="bg-blue-900 p-8 rounded-3xl border-4 border-blue-500 shadow-2xl">
            <h2 class="text-6xl font-bold text-white mb-4">ทองรูปพรรณ</h2>
            <div class="flex flex-col gap-4">
                <div class="price-container"><span class="label-text">รับซื้อ</span><span id="ornBuy" class="big-text">0</span></div>
                <div class="price-container"><span class="label-text">ขายออก</span><span id="ornSell" class="big-text">0</span></div>
            </div>
        </div>
    </div>

    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const API_URL = "https://apicheckpricev3.huasengheng.com/api/Values/GetPrice";
        let lastPrice = 0;

        function formatNumber(num) {
            return new Intl.NumberFormat('th-TH', { maximumFractionDigits: 0 }).format(num);
        }

        async function triggerAlert() {
            const body = document.body;
            try { await document.getElementById('alertSound').play(); } catch(e) {}
            body.classList.add('flash-alert');
            setTimeout(() => body.classList.remove('flash-alert'), 10000);
        }

        async function fetchGoldPrice() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const ref = data.find(item => item.GoldType === "REF") || data[0];
                const barBuy = parseFloat(ref.Buy.replace(/,/g, ''));
                const barSell = parseFloat(ref.Sell.replace(/,/g, ''));

                if (lastPrice !== 0 && lastPrice !== barBuy) {
                    const diff = barBuy - lastPrice;
                    const diffEl = document.getElementById('diffBuy');
                    diffEl.innerText = (diff > 0 ? "+" : "") + diff;
                    diffEl.className = "diff-text " + (diff > 0 ? "text-green-300" : "text-red-300");
                    triggerAlert();
                }

                lastPrice = barBuy;
                document.getElementById('barBuy').innerText = formatNumber(barBuy);
                document.getElementById('barSell').innerText = formatNumber(barSell);
                document.getElementById('ornBuy').innerText = formatNumber(barBuy - 800);
                document.getElementById('ornSell').innerText = formatNumber(barSell + 500);

                const dateObj = new Date(ref.TimeUpdate);
                document.getElementById('systemStatus').innerText = `อัปเดต: ${dateObj.toLocaleDateString('th-TH')} เวลา ${dateObj.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})} น.`;
            } catch (error) {
                console.error(error);
            }
        }

        setInterval(fetchGoldPrice, 30000);
        fetchGoldPrice();
    </script>
</body>
</html>
