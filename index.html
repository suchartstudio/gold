<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ราคาทองคำ Real-time TV Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* บังคับให้หน้าเว็บเต็มจอพอดีเสมอ เหมาะสำหรับเปิดบนจอ TV */
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* ปรับขนาดให้พอดีกับจอ 1080p โดยแบ่งสัดส่วน */
        .card-box { height: 44vh; display: flex; flex-direction: column; justify-content: center; }
        
        .big-text { font-size: 8.5rem; font-weight: 700; line-height: 1; }
        .label-text { font-size: 3rem; font-weight: 700; }
        .diff-text { font-size: 3rem; font-weight: 700; }
        .flash-alert { background-color: #f59e0b !important; }
    </style>
</head>
<body class="flex flex-col p-4 gap-4">

    <div class="h-[8vh] w-full text-center flex items-center justify-center bg-slate-800 rounded-2xl">
        <h1 class="text-5xl font-bold text-white uppercase tracking-widest">ราคาสมาคมค้าทองคำ 96.5%</h1>
    </div>

    <div class="flex flex-col gap-4 h-[92vh]">
        
        <!-- บล็อกทองคำแท่ง -->
        <div id="barCard" class="card-box bg-red-900 px-10 rounded-3xl border-4 border-red-500 shadow-2xl">
            <h2 class="text-5xl font-bold text-white mb-2">ทองคำแท่ง</h2>
            <div class="flex items-center justify-between">
                <span class="label-text">รับซื้อ <span id="diffBuy" class="ml-6"></span></span>
                <span id="barBuy" class="big-text text-white">0</span>
            </div>
            <div class="flex items-center justify-between mt-4">
                <span class="label-text">ขายออก</span>
                <span id="barSell" class="big-text text-yellow-300">0</span>
            </div>
        </div>

        <!-- บล็อกทองรูปพรรณ -->
        <div id="ornCard" class="card-box bg-blue-900 px-10 rounded-3xl border-4 border-blue-500 shadow-2xl">
            <h2 class="text-5xl font-bold text-white mb-2">ทองรูปพรรณ</h2>
            <div class="flex items-center justify-between">
                <span class="label-text">รับซื้อ</span>
                <span id="ornBuy" class="big-text text-white">0</span>
            </div>
            <div class="flex items-center justify-between mt-4">
                <span class="label-text">ขายออก</span>
                <span id="ornSell" class="big-text text-yellow-300">0</span>
            </div>
        </div>
    </div>

    <!-- ส่วนแสดงสถานะการอัปเดตของสมาคมฯ -->
    <div id="systemStatus" class="fixed bottom-4 left-6 text-2xl text-slate-400">กำลังเชื่อมต่อ...</div>

    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        // เปลี่ยนมาใช้ API ที่ดึงข้อมูลจากเว็บสมาคมค้าทองคำ (goldtraders.or.th) โดยตรง
        const API_URL = "https://api.chnwt.dev/thai-gold-api";
        let lastPrice = 0;

        // ฟังก์ชันจัดรูปแบบตัวเลข (กำหนดหลักทศนิยมได้)
        function formatNumber(num, fractionDigits = 0) { 
            return new Intl.NumberFormat('th-TH', { 
                minimumFractionDigits: fractionDigits,
                maximumFractionDigits: fractionDigits 
            }).format(num); 
        }

        async function triggerAlert() {
            const body = document.body;
            try { await document.getElementById('alertSound').play(); } catch(e) {}
            body.classList.add('flash-alert');
            setTimeout(() => body.classList.remove('flash-alert'), 10000);
        }

        async function fetchGoldPrice() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // ตรวจสอบสถานะการดึงข้อมูลจาก API
                if (data.status !== "success" || !data.response) {
                    console.error("API Error or data structure changed.");
                    return;
                }

                const priceData = data.response.price;

                // แกะข้อมูลและลบคอมมาออกเพื่อแปลงเป็นตัวเลขสำหรับการคำนวณส่วนต่าง
                const barBuy = parseFloat(priceData.gold_bar.buy.replace(/,/g, ''));
                const barSell = parseFloat(priceData.gold_bar.sell.replace(/,/g, ''));
                const ornBuy = parseFloat(priceData.gold.buy.replace(/,/g, '')); // ใน API คีย์ 'gold' คือทองรูปพรรณ
                const ornSell = parseFloat(priceData.gold.sell.replace(/,/g, ''));

                // คำนวณส่วนต่างเมื่อราคาทองคำแท่งรับซื้อมีการเปลี่ยนแปลง
                if (lastPrice !== 0 && lastPrice !== barBuy) {
                    const diff = barBuy - lastPrice;
                    const diffEl = document.getElementById('diffBuy');
                    diffEl.innerText = (diff > 0 ? "+" : "") + formatNumber(diff, 0);
                    diffEl.className = "diff-text " + (diff > 0 ? "text-green-300" : "text-red-300");
                    triggerAlert();
                }

                lastPrice = barBuy;

                // อัปเดตราคาแสดงผลบน UI หน้าจอ
                document.getElementById('barBuy').innerText = formatNumber(barBuy, 0);
                document.getElementById('barSell').innerText = formatNumber(barSell, 0);
                
                // ราคารับซื้อคืนทองรูปพรรณของสมาคมฯ จะมีเศษทศนิยม (ราคาฐานภาษี) จึงเปิดให้แสดงทศนิยม 2 ตำแหน่ง
                document.getElementById('ornBuy').innerText = formatNumber(ornBuy, 2);
                document.getElementById('ornSell').innerText = formatNumber(ornSell, 0);

                // ดึงวันเวลาและรอบที่ประกาศจากหน้าเว็บสมาคมฯ มาแสดงผลด้านล่างจอ
                const updateDate = data.response.update_date;
                const updateTime = data.response.update_time;
                document.getElementById('systemStatus').innerText = `อัปเดตสมาคมฯ: วันที่ ${updateDate} ${updateTime}`;
                
            } catch (error) { 
                console.error(error); 
                document.getElementById('systemStatus').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ (กำลังลองใหม่)...";
            }
        }

        // ตั้งเวลาดึงข้อมูลใหม่ทุกๆ 30 วินาที
        setInterval(fetchGoldPrice, 30000);
        // สั่งให้ทำงานทันทีในครั้งแรกที่เปิดหน้าจอ
        fetchGoldPrice();
    </script>
</body>
</html>
