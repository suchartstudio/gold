<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานราคาทองคำ Real-time</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥇</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
        }
        .card-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-700 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200">
                    THAI GOLD PRICE
                </h1>
                <p class="text-slate-400 text-sm mt-1">อ้างอิงข้อมูลจากสมาคมผู้ค้าทองคำ (ระบบ API ความเสถียรสูง)</p>
            </div>
            <div class="flex items-center space-x-3 bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 text-xs text-slate-300">
                <span class="relative flex h-2 w-2" id="pingDotParent">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500" id="pingDot"></span>
                </span>
                <span id="systemStatus">กำลังเชื่อมต่อ API...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="card-gradient rounded-2xl p-6 shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-yellow-400 text-7xl font-bold select-none">BAR</div>
                <h3 class="text-amber-400 font-semibold text-lg flex items-center gap-2">
                    <span class="w-2 h-4 bg-amber-400 rounded-full"></span> ทองคำแท่ง (96.5%)
                </h3>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <span class="text-xs text-slate-400 block mb-1">รับซื้อ (บาทละ)</span>
                        <span class="text-2xl md:text-3xl font-bold text-slate-200" id="barBuy">0.00 ฿</span>
                    </div>
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <span class="text-xs text-slate-400 block mb-1">ขายออก (บาทละ)</span>
                        <span class="text-2xl md:text-3xl font-bold text-yellow-400" id="barSell">0.00 ฿</span>
                    </div>
                </div>
            </div>

            <div class="card-gradient rounded-2xl p-6 shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-yellow-400 text-7xl font-bold select-none">ORN</div>
                <h3 class="text-amber-300 font-semibold text-lg flex items-center gap-2">
                    <span class="w-2 h-4 bg-amber-300 rounded-full"></span> ทองรูปพรรณ (96.5%)
                </h3>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <span class="text-xs text-slate-400 block mb-1">ฐานราคากลาง</span>
                        <span class="text-2xl md:text-3xl font-bold text-slate-200" id="ornBuy">0.00 ฿</span>
                    </div>
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <span class="text-xs text-slate-400 block mb-1">ขายออก (บาทละ)</span>
                        <span class="text-2xl md:text-3xl font-bold text-yellow-400" id="ornSell">0.00 ฿</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="card-gradient rounded-2xl p-6 shadow-xl mb-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-slate-200">กราฟแนวโน้มราคารับซื้อทองคำแท่ง</h3>
                <span class="text-xs bg-amber-400/10 text-amber-400 px-3 py-1 rounded-full border border-amber-400/20">ล่าสุด</span>
            </div>
            <div class="w-full h-[300px] bg-slate-900/40 rounded-xl p-2 border border-slate-800">
                <canvas id="goldTrendChart"></canvas>
            </div>
        </div>

    </div>

    <script>
        // ใช้ API กลางที่ประมวลผลข้อมูลจากสมาคมฯ มาให้แล้ว (หลบหลีก CORS & Anti-bot ได้ 100%)
        const API_URL = "https://api.chnwt.dev/thai-gold-api/latest";
        
        function cleanPrice(priceStr) {
            if (!priceStr) return 0;
            return parseFloat(priceStr.toString().replace(/,/g, ''));
        }

        // ฟังก์ชันนี้บังคับให้แสดงทศนิยม .00 เสมอ ไม่ว่าค่าจะมาเป็นจำนวนเต็มก็ตาม
        function formatCurrency(num) {
            if (isNaN(num) || num === 0) return "0.00 ฿";
            return new Intl.NumberFormat('th-TH', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            }).format(num) + ' ฿';
        }

        async function fetchGoldDataAPI() {
            const systemStatus = document.getElementById('systemStatus');
            const pingDot = document.getElementById('pingDot');
            const pingDotParent = document.getElementById('pingDotParent');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("API Connection Failed");
                
                const data = await response.json();
                const goldData = data.response;
                
                // ดึงข้อมูลและทำ Bulletproof ดักจับกรณี API เปลี่ยนคีย์ชื่อตัวแปร
                const liveBarBuy = cleanPrice(goldData.price.gold_bar?.buy || "0");
                const liveBarSell = cleanPrice(goldData.price.gold_bar?.sell || "0");
                
                // เช็คทั้งสองชื่อ เผื่อ API อัปเดตกลับไปกลับมา
                const rawOrnBuy = goldData.price.gold?.buy || goldData.price.gold_ornament?.buy || "0";
                const rawOrnSell = goldData.price.gold?.sell || goldData.price.gold_ornament?.sell || "0";
                
                const liveOrnBuy = cleanPrice(rawOrnBuy);
                const liveOrnSell = cleanPrice(rawOrnSell);

                if (liveBarBuy === 0) throw new Error("ไม่พบข้อมูลราคาจากระบบ API");

                // ส่งค่าขึ้นหน้าเว็บ (จะแสดงผลแบบ 40,000.00 ฿ แน่นอน)
                document.getElementById('barBuy').innerText = formatCurrency(liveBarBuy);
                document.getElementById('barSell').innerText = formatCurrency(liveBarSell);
                document.getElementById('ornBuy').innerText = formatCurrency(liveOrnBuy);
                document.getElementById('ornSell').innerText = formatCurrency(liveOrnSell);

                systemStatus.innerText = `อัปเดตล่าสุด: ${goldData.update_date} ${goldData.update_time}`;
                systemStatus.classList.replace('text-slate-300', 'text-emerald-400');

            } catch (error) {
                console.error("API Error:", error);
                systemStatus.innerText = "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ข้อมูลได้";
                systemStatus.classList.replace('bg-slate-800', 'bg-rose-950');
                systemStatus.classList.replace('text-slate-300', 'text-rose-400');
                pingDot.classList.replace('bg-green-500', 'bg-rose-500');
                pingDotParent.children[0].classList.replace('bg-green-400', 'bg-rose-400');
            }
        }

        // --- ส่วนของการวาดกราฟ ---
        let goldChartInstance = null;
        function renderTrendChart() {
            const ctx = document.getElementById('goldTrendChart').getContext('2d');
            
            // ข้อมูลตัวอย่างสำหรับกราฟ (ในระบบจริงต้องดึงจาก Database)
            const daysLabels = ['ย้อนหลัง 4 วัน', 'ย้อนหลัง 3 วัน', 'ย้อนหลัง 2 วัน', 'เมื่อวาน', 'ล่าสุด'];
            const historicalData = [40000, 40150, 40100, 40300, 40500];

            goldChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: daysLabels,
                    datasets: [{
                        label: 'ราคารับซื้อทองคำแท่ง (บาท)',
                        data: historicalData,
                        borderColor: '#fbbf24', 
                        backgroundColor: 'rgba(251, 191, 36, 0.05)',
                        borderWidth: 3,
                        pointBackgroundColor: '#d97706',
                        pointBorderColor: '#fbbf24',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        tension: 0.3, 
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    // บังคับทศนิยม .00 ใน Popup กราฟด้วย
                                    return new Intl.NumberFormat('th-TH', { 
                                        minimumFractionDigits: 2, 
                                        maximumFractionDigits: 2 
                                    }).format(context.raw) + ' ฿';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(51, 65, 85, 0.3)' },
                            ticks: { color: '#94a3b8' }
                        },
                        y: {
                            grid: { color: 'rgba(51, 65, 85, 0.3)' },
                            ticks: {
                                color: '#94a3b8',
                                callback: function(value) { 
                                    return new Intl.NumberFormat('th-TH').format(value); 
                                }
                            }
                        }
                    }
                }
            });
        }

        // เรียกใช้งานพร้อมกันเมื่อเว็บโหลดเสร็จ
        window.onload = () => {
            fetchGoldDataAPI();
            renderTrendChart();
        };
    </script>
</body>
</html>
